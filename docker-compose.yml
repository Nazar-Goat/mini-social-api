name: mini-social-api


services:
  server:
    restart: always
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - DOCKERIZED=1
    ports:
      - ${APP_PORT}:${APP_PORT}
    volumes:
      - ./docker_data/logs:/var/opt/log
    networks:
      - mini-social-api
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  db:
    image: postgres:16-bookworm
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_POSTGRES_USER}
      POSTGRES_PASSWORD: ${DB_POSTGRES_PASS}
      POSTGRES_DB: ${DB_POSTGRES_NAME}
    ports:
      - ${DB_POSTGRES_PORT}:5432
    volumes:
      - ./docker_data/db_psql:/var/lib/postgresql/data
    networks:
      - mini-social-api
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_POSTGRES_USER} -d ${DB_POSTGRES_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 10

  redis_db:
    image: redis:7
    env_file:
      - .env
    restart: always
    command: redis-server --requirepass ${REDIS_PASS}
    ports:
      - ${REDIS_PORT}:6379
    volumes:
      - ./docker_data/redis_db:/data
    networks:
      - mini-social-api
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$REDIS_PASS\" ping | grep PONG"]
      interval: 5s
      timeout: 5s
      start_period: 5s
      retries: 10

networks:
  mini-social-api:
    driver: bridge
    name: crocus-crm